body:
  text: 玄覽人鳥山經圖太上曰無數諸天各有人鳥之山有人之象有鳥之形峯巖峻極不可勝言玄臺寳殿尊神所居林澗鳥獸木石香花芝草衆藥不死之津長生之液又難具陳陳之無益於學學者自應精尋得一知萬了然究知教須題示故略標文妙氣結字聖匠冩之以傳上學不泄中人妙氣之字即是山容其表異相其跡殊姿皆是妙氣化而成焉玄達之思閉目見之周覽既畢行之有徵妙氣旣降肉身能飛乆鍊得妙肉去妙充其翔似鳥山遊三界之外其神眞人入宴三清之中總號人鳥學者由山縁山至道永保長存自非至精勿妄叩也太上曰人鳥山之形質是天地人之生根元氣之所因妙化之所用聖眞求其域仙靈仰其神敬而事之存而念之受而醮之繕而帶之精而行之和而宻之乆無怠懈三氣調均生身生子爲道種人在世行化入山研方岀處自在魔不敢當於是朝致五嶽使役八溟從三天之君佩日月之精知之不死習之永生諦之合智究之同神其山之上元始天王所居其山之下衆聖眞仙所處其山之氣生五色之水名反魂流液成脂名曰震檀之香西王母初學道詣元始天王三千年道成德就應還崐崘之山臨去辭元始天王共刻銘人鳥山上虛空之中製作文字字方一丈懸在空中以接後學于今存焉九老仙都君九氣文人圖畫山形佩之於肘天帝寫空中之書以附人鳥之體百年一出以傳眞人道士有此山形及書文備者便得仙度遊宴崐崘能讀此書萬徧修行不負文言天帝君即遣使雲車羽盖來迎之也不須服御丹液無勞導引屈伸精之不休自獲升天矣太上曰凡能清齋三月别於靜室修行仙人當降自以此文字語人受之宻遵速成眞聖道士佩之役使萬神正月有甲子二月有壬申三月有戊子一年之中唯取日祭醮山形於金鏡之上相傳口訣之事愼勿妄泄書文若年中無此三日或有而邂逅趣得甲子一年三醮也醮時皆齋清嚴禁斷明月之夜露岀中庭不須壇繤不可他知宻自灑掃淨席向南兆敷別席向北施禮先以明鏡九寸面者置座中央紫文複傘以罩座上紫錦巾囊覆籍山圖正安鏡中清酒三椀置圖之前香脯棗果圓施鏡外酌酒半椀嗽口捻香即位閉目叩齒三通存思依常鳴鼔發鑪亦如常法又三稔香臨目見太上大道十方天尊元始眞王人鳥山元氣生神太帝君雲駕羅列布滿空中同來向座良乆分明仍宻稱名位臣妾姓名奉請太上大道十方天尊元始眞王人鳥山元氣生神太帝君一切諸靈官今日吉時良敢薦芬芳表獻至誠仰希垂降臣妾某等稽首禮拜仍禮三拜伏地閉目存神降座良乆乃起又三拈酒長跪稱位臣妾姓名上啓太上大道十方天尊元始眞王人鳥山元氣生神太帝君一切神明臣妾叨恩得見今日奉對尊神喜懼交集惟願大慈巳生當成使臣妾學道得道求仙得仙神通自在永保長存小醜賤臣妾不敢多陳不勝踊躍屏營謹稽首禮拜三拜拜畢三拈漏拈畢又啓如此三拈三啓畢三捻香起倚送神稱位臣妾姓名上啓太上大道十方天尊元始眞王人鳥山元氣生神太帝君一切靈官縁恩上請紆廻雲儀神駕巳整還升三清臣妾戀慕俯仰屏營惟願大慈流布洪恩臣妾得道謁見王宮後冝有請仰希重降臣妾某等稽首禮拜三拜畢起復爐復爐畢秉一椀酒瀉浸四周畢依次歛之也同志者還房進胙不得妄與非法之人夫妻接侍皆同此法不同不得交會此禁至重明各愼之清齋千日丹書山形於薄紙上方三寸至五寸玉池之泉向王吞服一服長生不死二服神仙飛行三服升登尊位與道合同清齋起圖佩之二年晨夕誦文吉日修事愼終如始一千日限足遊行山澤威制五嶽三河四海八溟九地一切神靈奉迎拜謁功德流布五年七年不過九年超登三清矣太上人鳥山眞形圖太上玉晨大道君曰人鳥山名甚多或名須彌山或名玄圃山或名大地金根山或名本無妙玄山或名元氣寳洞山或名神玄七變七轉觀天山一山七名總號玄覽滌除疪漏集會廣澄其髙無極勢與道同示應有崖竦入玄空流衍基布三百六十億萬里面有二百四十萬門内外皆自然七寳宮殿神仙所遊聖眞息處元始天王治在山上上面又有天帝宮太帝室上清眞人更相盻接不可勝數山中自然有金液還丹七名靈香其香不焚常生妙氣逆風遠聞七千里外神仙之香得者不死椿林寳木金玉之樹光明耀日精徹虛空動揺發響自成八音金翅鳯凰鵬鳥朱雀神龍麒麟獅子銅頭鐡額辟邪鑿齒大神禽獸遊其寳林之中巨鯤鱗族其玉池之下靈物竒瑞不可具稱粗標言之以舉大槩耳山内自然之字一十有一其訣口中寄文附出弓龍行神出除凶殃辟非样山外空虛之字向左百二十四向右百二十合二百四十四字誦之在心訣在師口玄覽九人鳥山經圖
